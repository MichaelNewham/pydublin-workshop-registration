# =============================================================================
# templates.yaml - which Form templates are offered in the online IDE.
# =============================================================================
# Not used by the standalone app-server at runtime (only by the Anvil Editor),
# but kept in the repo so the project round-trips cleanly between local dev
# and the cloud IDE.

default_form_template: standard-page
form_templates:
  - name: standard-page
    description: "Header + footer chrome with brand styling (default)."
    thumbnail: null
  - name: blank
    description: "Blank canvas - no chrome."
    thumbnail: null
