<!--
  standard-page.html - the HTML shell that wraps every Anvil Form

  This is the "basic HTML/CSS styling" + "at least one simple JavaScript
  interaction" requirement from Option B. The <link> pulls in theme.css.
  The inline <script> is the per-page booster for the JS interactions
  declared in anvil.yaml (clipboard copy + notes character counter).
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PyDublin Workshop 2026 - Event Registration</title>
  <link rel="stylesheet" href="/_/theme/theme.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="site-header">
    <a href="/" class="brand">
      <span class="brand-mark">Py</span>Dublin Workshop 2026
    </a>
    <nav class="site-nav">
      <a href="/">Event</a>
      <a href="/#register">Register</a>
    </nav>
  </header>

  <!-- Anvil mounts the active Form's markup here: -->
  ${form_html}

  <footer class="site-footer">
    <p>
      Built for D4B - Elective 2: Business Programming &middot;
      Option B: Low-Code / No-Code Business App
    </p>
  </footer>

  <script>
    // Honours reduced-motion preferences for the focus styles in theme.css.
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      document.documentElement.classList.add('reduce-motion');
    }
  </script>
</body>
</html>
