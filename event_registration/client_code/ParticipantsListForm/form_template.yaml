# Form: ParticipantsListForm (and its RepeatingPanel item template)
container:
  type: ColumnPanel
components:
  - type: Label
    name: title_label
    properties: {text: 'Participants', role: title, bold: true, font_size: 22}
  - type: Label
    name: count_label
    properties: {text: '', italic: true, foreground: '#666', spacing_below: small}
  - type: FlowPanel
    name: action_row
    properties: {align: right, spacing_below: small}
    components:
      - type: Button
        name: refresh_button
        properties: {text: Refresh, role: outline}
        event_bindings: {click: refresh_button_click}
      - type: Button
        name: back_button
        properties: {text: Back}
        event_bindings: {click: back_button_click}
  - type: RepeatingPanel
    name: repeating_panel
    properties:
      item_template: ParticipantItem
      spacing_above: small
