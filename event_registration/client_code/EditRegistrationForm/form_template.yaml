# Form: EditRegistrationForm
container:
  type: ColumnPanel
components:
  - type: Label
    name: heading
    properties: {text: 'Edit registration', role: title, bold: true, font_size: 22}
  - type: TextBox
    name: name_box
    properties: {placeholder: 'Name'}
  - type: TextBox
    name: email_box
    properties: {placeholder: 'email@example.com'}
  - type: TextBox
    name: phone_box
    properties: {placeholder: 'Phone'}
  - type: TextBox
    name: company_box
    properties: {placeholder: 'Company'}
  - type: TextArea
    name: notes_box
    properties: {placeholder: 'Notes', height: 80}
  - type: FlowPanel
    name: action_row
    properties: {align: right, spacing_above: medium}
    components:
      - type: Button
        name: cancel_edit_button
        properties: {text: 'Back', role: outline}
        event_bindings: {click: cancel_edit_button_click}
      - type: Button
        name: save_button
        properties: {text: 'Save changes', role: primary, bold: true}
        event_bindings: {click: save_button_click}
