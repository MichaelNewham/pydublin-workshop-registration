# Form: RegistrationDetailForm
container:
  type: ColumnPanel
components:
  - type: Label
    name: heading
    properties: {text: 'Loading...', role: title, bold: true, font_size: 22}
  - type: Label
    name: phone_label
    properties: {text: 'Phone', bold: true, spacing_above: medium}
  - type: Label
    name: phone_value
    properties: {text: ''}
  - type: Label
    name: company_label
    properties: {text: 'Company', bold: true, spacing_above: small}
  - type: Label
    name: company_value
    properties: {text: ''}
  - type: Label
    name: created_label
    properties: {text: 'Registered at', bold: true, spacing_above: small}
  - type: Label
    name: created_value
    properties: {text: ''}
  - type: Label
    name: status_label
    properties: {text: 'Status', bold: true, spacing_above: small}
  - type: Label
    name: status_value
    properties: {text: ''}
  - type: Label
    name: notes_label
    properties: {text: 'Notes', bold: true, spacing_above: small}
  - type: Label
    name: notes_value
    properties: {text: ''}
  - type: FlowPanel
    name: action_row
    properties: {align: right, spacing_above: large}
    components:
      - type: Button
        name: back_button
        properties: {text: 'Back', role: outline}
        event_bindings: {click: back_button_click}
      - type: Button
        name: edit_button
        properties: {text: 'Edit'}
        event_bindings: {click: edit_button_click}
      - type: Button
        name: cancel_button
        properties: {text: 'Cancel registration', role: danger}
        event_bindings: {click: cancel_button_click}
      - type: Button
        name: restore_button
        properties: {text: 'Restore registration', role: primary, visible: false}
        event_bindings: {click: restore_button_click}
