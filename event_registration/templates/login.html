{% extends "base.html" %}
{% block content %}

<section class="form-card">
  <h1 class="page-title">Organiser sign in</h1>
  <p class="meta-line">Enter the shared organiser password to manage registrations.</p>

  <form method="POST" action="{{ url_for('routes.login') }}">
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             autocomplete="current-password"
             autofocus required />
    </div>
    <div class="action-row">
      <a href="{{ url_for('routes.home') }}" class="btn btn-outline">Back</a>
      <button type="submit" class="btn btn-primary">Sign in</button>
    </div>
  </form>
</section>

{% endblock %}
