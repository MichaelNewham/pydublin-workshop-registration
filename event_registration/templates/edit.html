{% extends "base.html" %}
{% block content %}

<section class="form-card">
  <h1 class="page-title">Edit registration</h1>
  <p class="meta-line mono">{{ reg.ref }}</p>

  <form method="POST" action="{{ url_for('routes.edit', reg_id=reg.id) }}" novalidate>
    <div class="field">
      <label for="name">Name *</label>
      <input type="text" id="name" name="name"
             value="{{ reg.name }}" maxlength="200" required />
    </div>
    <div class="field">
      <label for="email">Email *</label>
      <input type="email" id="email" name="email"
             value="{{ reg.email }}" maxlength="200" required />
    </div>
    <div class="field">
      <label for="phone">Phone</label>
      <input type="tel" id="phone" name="phone"
             value="{{ reg.phone or '' }}" maxlength="50" />
    </div>
    <div class="field">
      <label for="company">Company</label>
      <input type="text" id="company" name="company"
             value="{{ reg.company or '' }}" maxlength="200" />
    </div>
    <div class="field">
      <label for="notes">Notes</label>
      <textarea id="notes" name="notes" rows="4"
                maxlength="280">{{ reg.notes or '' }}</textarea>
      <p class="field-hint js-notes-counter">280 characters left</p>
    </div>
    <div class="action-row">
      <a href="{{ url_for('routes.detail', reg_id=reg.id) }}" class="btn btn-outline">Back</a>
      <button type="submit" class="btn btn-primary">Save changes</button>
    </div>
  </form>
</section>

{% endblock %}
