#_CI: lint + boot-test on every push and PR. Catches broken Python / YAML
# before it lands on main, so Render can deploy cleanly.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-boot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Compile-check all Python files
        run: |
          # Fail on syntax errors; bail out on import surprises.
          python -m compileall -q event_registration run.py

      - name: Flake8 (style only, stop on serious issues)
        run: flake8 event_registration run.py --max-line-length=100 --select=E9,F63,F7,F82 --statistics

      - name: Boot test (app factory works + routes register)
        env:
          SECRET_KEY: ci-test-secret
          FLASK_DEBUG: '1'
          # Use a known test-only password for the gate so the smoke test
          # can authenticate. The default ('pydublin-2026') would also work.
          ORGANISER_PASSWORD: ci-test-pw
        run: |
          python - <<'PY'
          from event_registration import create_app
          app = create_app()
          client = app.test_client()

          # --- Public routes must return 200 ---
          r = client.get('/');          assert r.status_code == 200, f"home returned {r.status_code}"
          r = client.get('/register');  assert r.status_code == 200, f"register GET returned {r.status_code}"
          r = client.get('/login');     assert r.status_code == 200, f"login GET returned {r.status_code}"

          # --- Organiser gate: unauthenticated /participants must redirect to /login ---
          r = client.get('/participants')
          assert r.status_code == 302, f"participants (unauth) should be 302, got {r.status_code}"
          assert '/login' in r.headers.get('Location', ''), f"expected redirect to /login, got {r.headers.get('Location')}"

          # --- Register a row so /participants has content after auth ---
          r = client.post('/register', data={
              'name': 'CI Test', 'email': 'ci@example.com',
              'phone': '', 'company': '', 'notes': '',
          }, follow_redirects=False)
          assert r.status_code == 302, f"POST /register should be 302, got {r.status_code}"

          # --- Wrong password is rejected (form re-renders, no session cookie set) ---
          r = client.post('/login', data={'password': 'wrong-pw'})
          assert r.status_code == 200, f"wrong-pw POST should re-render login (200), got {r.status_code}"
          r = client.get('/participants')
          assert r.status_code == 302, f"after wrong-pw /participants should still redirect, got {r.status_code}"

          # --- Correct password unlocks the gate ---
          r = client.post('/login', data={'password': 'ci-test-pw'}, follow_redirects=False)
          assert r.status_code == 302, f"correct-pw POST should redirect (302), got {r.status_code}"
          r = client.get('/participants')
          assert r.status_code == 200, f"after login /participants should be 200, got {r.status_code}"

          # --- Logout re-locks the gate ---
          r = client.post('/logout', follow_redirects=False)
          assert r.status_code == 302, f"logout should redirect (302), got {r.status_code}"
          r = client.get('/participants')
          assert r.status_code == 302, f"after logout /participants should redirect again, got {r.status_code}"

          print("All smoke tests passed (public + gate + auth + logout).")
          PY
